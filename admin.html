<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard">

    <h1>Admin Panel</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Users</h3>
            <h1>{{ total_users }}</h1>
        </div>

        <div class="card">
            <h3>Total Resumes</h3>
            <h1>{{ total_resumes }}</h1>
        </div>

        <div class="card">
            <h3>Total Analyses</h3>
            <h1>{{ total_resumes }}</h1>
        </div>

    </div>

    <br>

    <table border="1">

        <tr>
            <th>User Name</th>
            <th>Email</th>
            <th>Action</th>
        </tr>

        {% for user in users %}
        <tr>

            <td>{{ user[1] }}</td>
            <td>{{ user[2] }}</td>

            <td>
                <a href="/delete_user/{{ user[0] }}?password=admin123"
                   onclick="return confirm('Are you sure you want to delete this user?');">
                   Delete User
                </a>
            </td>

        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/dashboard">
        <button>Back to Dashboard</button>
    </a>

</div>

</body>
</html>
